    <!-- Outer arc ring — Navy Blue -->
    <path d="M -82 0 A 82 82 0 1 1 82 0" fill="none" stroke="#160D76" stroke-width="14" stroke-linecap="round" style="fill:none;stroke:rgb(22, 13, 118);color:rgb(0, 0, 0);stroke-width:14px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
